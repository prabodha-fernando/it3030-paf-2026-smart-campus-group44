name: CI — Smart Campus

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -B
        env:
          AZURE_MYSQL_HOST: placeholder
          AZURE_MYSQL_DB: placeholder
          AZURE_MYSQL_USER: placeholder
          AZURE_MYSQL_PASSWORD: placeholder
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          JWT_SECRET: SmartCampusPlaceholderSecretKeyForCIBuildThatIsLongEnough
          FRONTEND_URL: http://localhost:5174

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_WS_URL: http://localhost:8080/ws